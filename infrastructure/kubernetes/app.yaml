apiVersion: apps/v1
kind: Deployment
metadata: { name: liquid-messenger }
spec:
  replicas: 2
  selector: { matchLabels: { app: liquid-messenger } }
  template:
    metadata: { labels: { app: liquid-messenger } }
    spec:
      containers:
        - name: app
          image: liquid-messenger:latest
          ports: [{ containerPort: 8080 }]
          envFrom: [{ secretRef: { name: liquid-messenger-env } }]
          readinessProbe: { httpGet: { path: /api/health, port: 8080 }, initialDelaySeconds: 10, periodSeconds: 10 }
---
apiVersion: v1
kind: Service
metadata: { name: liquid-messenger }
spec:
  selector: { app: liquid-messenger }
  ports: [{ port: 80, targetPort: 8080 }]
